name: CI

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Build & Test (Swift Package library targets) ───────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
          swift --version

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-v2-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-v2-

      - name: Build (debug)
        run: swift build

      - name: Test
        run: swift test --parallel

  # ── SwiftLint ─────────────────────────────────────────────────────────────
  lint:
    name: SwiftLint
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint --reporter github-actions-logging

  # ── Release build + DMG (on tags) ────────────────────────────────────────
  release-build:
    name: Release Build & DMG
    runs-on: macos-14
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-and-test, lint]
    permissions:
      contents: write   # needed to upload release assets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-release-v2-${{ hashFiles('Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-v2-

      - name: Build release binary
        run: swift build -c release --product ReticleApp

      # ── Assemble .app bundle ──────────────────────────────────────────────
      # swift build produces a bare executable; we wrap it in a minimal .app
      # bundle so macOS treats it as a proper application.
      - name: Create Reticle.app bundle
        run: |
          APP="build/Reticle.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"
          cp .build/release/ReticleApp "$APP/Contents/MacOS/Reticle"
          cp App/Info.plist "$APP/Contents/Info.plist"
          # Copy icon if present
          [ -f "Resources/AppIcon.icns" ] && cp Resources/AppIcon.icns "$APP/Contents/Resources/"
          chmod +x "$APP/Contents/MacOS/Reticle"

      # ── Code-sign (ad-hoc for unsigned build) ────────────────────────────
      # Ad-hoc signing lets the binary run on the build machine and pass
      # Gatekeeper on developer machines with spctl disabled.
      # A proper Developer ID signature is needed for notarization (v1.0).
      - name: Ad-hoc sign
        run: codesign --force --deep --sign - build/Reticle.app

      # ── Build DMG ─────────────────────────────────────────────────────────
      - name: Create DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"   # strip leading 'v' from tag
          DMG_NAME="Reticle-${VERSION}.dmg"

          # Create a temporary folder with the .app + Applications symlink
          mkdir -p build/dmg_staging
          cp -R build/Reticle.app build/dmg_staging/
          ln -sf /Applications build/dmg_staging/Applications

          hdiutil create \
            -volname "Reticle ${VERSION}" \
            -srcfolder build/dmg_staging \
            -ov -format UDZO \
            -o "build/${DMG_NAME}"

          # Compute SHA-256 for the Homebrew cask formula
          shasum -a 256 "build/${DMG_NAME}" | awk '{print $1}' > build/Reticle.sha256
          echo "DMG_NAME=${DMG_NAME}" >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}"   >> "$GITHUB_ENV"

      # ── Sign DMG for Sparkle appcast ─────────────────────────────────────
      - name: Download Sparkle tools
        run: |
          curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/2.9.2/Sparkle-2.9.2.tar.xz" \
            -o /tmp/sparkle.tar.xz
          mkdir -p /tmp/sparkle_tools
          tar xf /tmp/sparkle.tar.xz -C /tmp/sparkle_tools

      - name: Sign update and update appcast.xml
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          DMG_PATH="build/${{ env.DMG_NAME }}"
          DMG_SIZE=$(stat -f%z "$DMG_PATH")
          DMG_URL="https://github.com/croc100/Reticle/releases/download/${{ github.ref_name }}/${{ env.DMG_NAME }}"
          PUB_DATE=$(date -u "+%a, %d %b %Y %H:%M:%S +0000")

          # Sign the DMG — private key fed via stdin from Actions secret
          ED_SIG=$(echo "$SPARKLE_PRIVATE_KEY" \
            | /tmp/sparkle_tools/bin/sign_update --ed-key-file - "$DMG_PATH" \
            | grep -oP '(?<=sparkle:edSignature=")[^"]+')

          # Prepend new <item> to the appcast channel
          python3 - <<PYEOF
          import re, pathlib
          appcast = pathlib.Path("site/public/appcast.xml").read_text()
          item = f"""
    <item>
      <title>Reticle ${{ env.VERSION }}</title>
      <pubDate>{PUB_DATE}</pubDate>
      <sparkle:version>$(grep -m1 CFBundleVersion App/Info.plist | grep -oE '[0-9]+')</sparkle:version>
      <sparkle:shortVersionString>${{ env.VERSION }}</sparkle:shortVersionString>
      <sparkle:releaseNotesLink>https://croc100.github.io/Reticle/changelog/</sparkle:releaseNotesLink>
      <sparkle:minimumSystemVersion>13.0</sparkle:minimumSystemVersion>
      <enclosure
        url="{DMG_URL}"
        sparkle:edSignature="{ED_SIG}"
        length="{DMG_SIZE}"
        type="application/octet-stream"
      />
    </item>
          """
          # Insert before closing </channel>
          appcast = appcast.replace("  </channel>", item + "\n  </channel>", 1)
          # Remove placeholder item if present
          appcast = re.sub(r'\s*<item>.*?PLACEHOLDER.*?</item>', '', appcast, flags=re.DOTALL)
          pathlib.Path("site/public/appcast.xml").write_text(appcast)
          PYEOF

      # ── Commit updated appcast.xml ────────────────────────────────────────
      - name: Commit appcast.xml
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/public/appcast.xml
          git diff --cached --quiet || git commit -m "appcast: add v${{ env.VERSION }}"
          git push origin main

      # ── Upload to GitHub Release ──────────────────────────────────────────
      - name: Upload DMG to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/${{ env.DMG_NAME }}
            build/Reticle.sha256

      # ── Print install instructions ────────────────────────────────────────
      - name: Print cask update instructions
        run: |
          SHA=$(cat build/Reticle.sha256)
          echo "======================================================"
          echo "  Homebrew Cask — update homebrew-reticle/reticle.rb"
          echo "======================================================"
          echo "  url    https://github.com/croc100/Reticle/releases/download/${{ github.ref_name }}/${{ env.DMG_NAME }}"
          echo "  sha256 ${SHA}"
          echo "  version ${{ env.VERSION }}"
          echo "======================================================"
