disabled_rules:
  - trailing_whitespace   # swift-format handles this

opt_in_rules:
  - empty_count
  - closure_spacing
  - collection_alignment
  - explicit_init
  - first_where
  - force_unwrapping
  - operator_usage_whitespace
  - redundant_nil_coalescing
  - sorted_imports
  - toggle_bool
  - unneeded_parentheses_in_closure_argument

included:
  - Sources
  - Tests

excluded:
  - .build
  - Packages

# ── Lengths ──────────────────────────────────────────────────────────────────
line_length:
  warning: 120
  error: 150
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 300
  error: 400

file_length:
  warning: 500
  error: 800
  ignore_comment_only_lines: true

function_body_length:
  warning: 60
  error: 100

# ── Naming ───────────────────────────────────────────────────────────────────
type_name:
  min_length: 3
  max_length: 50

identifier_name:
  min_length: 2
  max_length: 50
  excluded:
    - id
    - x
    - y

# ── Custom rules ─────────────────────────────────────────────────────────────
custom_rules:
  no_print_in_release:
    name: "No print() in production code"
    regex: '^\s*print\('
    included: "Sources/(?!.*Tests).*\\.swift"
    message: "Use os_log / Logger instead of print() in production code."
    severity: warning
